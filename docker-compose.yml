# MCP Foundry for Trading — Docker Compose
#
# Usage:
#   cp .env.example .env   # Fill in your credentials
#   docker-compose up

version: "3.9"

services:
  mcp-foundry:
    build: .
    container_name: mcp-foundry
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MCP_EXCHANGE=${MCP_EXCHANGE:-bybit}
      - EXCHANGE_TESTNET=${EXCHANGE_TESTNET:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
